{% extends "base.html" %}

{% block content %}
<style>
    .login-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }
    .login-card {
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        max-width: 450px;
        width: 100%;
        overflow: hidden;
    }
    .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
    }
    .login-header h2 {
        font-size: 28px;
        margin-bottom: 8px;
        color: white;
    }
    .login-header p {
        opacity: 0.9;
        font-size: 14px;
    }
    .login-body {
        padding: 35px;
    }
    .input-group {
        margin-bottom: 25px;
    }
    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
        font-size: 14px;
    }
    .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s;
    }
    .input-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    .login-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }
    .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }
    .register-link {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #e0e0e0;
        color: #666;
    }
    .register-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }
    .register-link a:hover {
        text-decoration: underline;
    }
    .error-message {
        background: #fee;
        color: #dc3545;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
        display: none;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Добро пожаловать</h2>
            <p>Войдите в свой аккаунт</p>
        </div>
        <div class="login-body">
            <div id="errorMsg" class="error-message"></div>
            
            <div class="input-group">
                <label>Номер телефона</label>
                <input type="tel" id="phone" placeholder="+79991234567">
            </div>
            
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль">
            </div>
            
            <button class="login-btn" onclick="login()">Войти</button>
            
            <div class="register-link">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>

<script>
async function login() {
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMsg');
    
    errorDiv.style.display = 'none';
    
    if (!phone || !password) {
        errorDiv.textContent = 'Пожалуйста, заполните все поля';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (!phone.match(/^\+?7\d{10}$/)) {
        errorDiv.textContent = 'Введите корректный номер телефона в формате +79991234567';
        errorDiv.style.display = 'block';
        return;
    }
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({phone, password})
        });
        
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('user_name', data.name);
            window.location.href = '/dashboard';
        } else {
            errorDiv.textContent = data.error || 'Неверный телефон или пароль';
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        errorDiv.textContent = 'Ошибка соединения с сервером';
        errorDiv.style.display = 'block';
    }
}

document.getElementById('phone').addEventListener('input', function(e) {
    let value = e.target.value;
    if (!value.startsWith('+') && value.length > 0) {
        e.target.value = '+' + value;
    }
});

document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        login();
    }
});
</script>
{% endblock %}
